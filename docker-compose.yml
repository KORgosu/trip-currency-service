# 로컬 개발 환경용 Docker Compose
# LocalStack과 최신 Kafka KRaft 모드를 사용한 AWS 서비스 테스트 환경
services:
  # LocalStack - AWS 서비스 에뮬레이션
  localstack:
    image: localstack/localstack:3.0
    container_name: currency-localstack
    ports:
      - "4566:4566"  # LocalStack 메인 포트
      - "4510-4559:4510-4559"  # 추가 서비스 포트
    environment:
      # 활성화할 AWS 서비스들
      SERVICES: s3,dynamodb,sqs,sns,lambda,apigateway,cloudwatch,logs,iam,sts
      DEBUG: 0  # 디버그 로그 줄이기
      DATA_DIR: /var/lib/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
      # 지속성을 위한 설정
      PERSISTENCE: 1
      # 초기화 스크립트
      INIT_SCRIPTS_PATH: /etc/localstack/init/ready.d
      # 권한 문제 해결을 위한 설정
      LOCALSTACK_HOST: localhost
      # 볼륨 마운트 경로 변경
      TMPDIR: /var/lib/localstack/tmp
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init:/etc/localstack/init/ready.d
    command: >
      bash -c "
        # 디렉토리 생성 및 권한 설정
        mkdir -p /var/lib/localstack/data
        mkdir -p /var/lib/localstack/tmp
        chmod -R 755 /var/lib/localstack
        
        # 기존 프로세스 정리
        pkill -f localstack || true
        
        # LocalStack 시작
        exec localstack start --host=0.0.0.0
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      timeout: 30s
      retries: 10
      interval: 10s
      start_period: 60s

  # MySQL (Aurora 대신)
  mysql:
    image: mysql:8.0
    container_name: currency-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: currency_db
      MYSQL_USER: currency_user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis (ElastiCache 대신)
  redis:
    image: redis:7-alpine
    container_name: currency-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  zookeeper:
    image: bitnami/zookeeper:3.8
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes

  kafka:
    image: bitnami/kafka:3.4
    ports:
      - "9092:9092" # 외부 접속용 포트 (호스트 머신 -> 컨테이너)
    volumes:
      - kafka_data:/bitnami/kafka
    environment:
      # --- [수정된 부분 시작] ---
      # 리스너 프로토콜 맵 정의
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      # 각 리스너가 수신할 주소 설정
      # INTERNAL은 컨테이너 내부 통신용, EXTERNAL은 외부(호스트) 통신용
      - KAFKA_CFG_LISTENERS=INTERNAL://:9093,EXTERNAL://:9092
      # 클라이언트에게 알려줄(광고할) 주소 설정
      # 내부 통신은 서비스 이름(kafka)으로, 외부 통신은 localhost로 알려줌
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      # 브로커 간 통신에 사용할 리스너 이름
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      # --- [수정된 부분 끝] ---
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper

  # Kafka UI (개발용)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: currency-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      # --- [수정] Kafka의 내부 통신용(INTERNAL) 리스너 주소로 변경 ---
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      DYNAMIC_CONFIG_ENABLED: 'true'

volumes:
  mysql_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  localstack_data:

networks:
  default:
    name: currency-network