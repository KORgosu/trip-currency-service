# 로컬 개발 환경용 Docker Compose
# LocalStack과 최신 Kafka KRaft 모드를 사용한 AWS 서비스 테스트 환경

# TODO: AWS 실시간 서비스 변경 - Docker Compose에서 AWS 서비스로 변경
# - LocalStack 서비스 제거 (실제 AWS 서비스 사용)
# - MySQL 대신 Aurora MySQL 사용
# - Redis 대신 ElastiCache 사용
# - Kafka 대신 Amazon MSK 사용
# - 각 서비스의 환경변수와 연결 설정을 AWS 리소스로 변경
# AWS 배포 시 수정 필요사항:
# 1. Aurora MySQL 클러스터 생성 및 엔드포인트 설정
# 2. ElastiCache Redis 클러스터 생성
# 3. Amazon MSK 클러스터 생성 (Kafka 호환)
# 4. DynamoDB 테이블 생성
# 5. S3 버킷 생성
# 6. SQS 큐 생성
# 7. VPC 및 보안 그룹 설정
# 8. IAM 역할 및 정책 설정
# --- [공통 환경 변수 템플릿] ---
x-common-env: &common-env
  ENVIRONMENT: local
  DB_HOST: mysql
  DB_PORT: 3306
  DB_NAME: currency_db
  DB_USER: currency_user
  DB_PASSWORD: password
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BOOTSTRAP_SERVERS: kafka:9093
  AWS_REGION: ap-northeast-2 # SQS 리전 일치
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  DYNAMODB_ENDPOINT: http://localstack:4566
  SQS_ENDPOINT: http://localstack:4566
  SQS_EXCHANGE_RATES_QUEUE_URL: http://localstack:4566/000000000000/exchange-rates
  SQS_USER_EVENTS_QUEUE_URL: http://localstack:4566/000000000000/user-events
  SQS_RANKING_EVENTS_QUEUE_URL: http://localstack:4566/000000000000/ranking-events
  SQS_DLQ_URL: http://localstack:4566/000000000000/data-processing-dlq

services:
  # TODO: AWS 실시간 시 제거 - LocalStack은 개발/테스트용으로만 사용
  # LocalStack - AWS 서비스 에뮬레이션
  localstack:
    image: localstack/localstack:3.0
    container_name: currency-localstack
    ports:
      - "4566:4566"  # LocalStack 메인 포트
      - "4510-4559:4510-4559"  # 추가 서비스 포트
    environment:
      # 활성화할 AWS 서비스들
      SERVICES: s3,dynamodb,sqs,sns,lambda,apigateway,cloudwatch,logs,iam,sts
      DEBUG: 0  # 디버그 로그 줄이기
      DATA_DIR: /var/lib/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
      # 지속성을 위한 설정
      PERSISTENCE: 1
      # 초기화 스크립트
      INIT_SCRIPTS_PATH: /etc/localstack/init/ready.d
      # 권한 문제 해결을 위한 설정
      DEFAULT_REGION: ap-northeast-2
      LOCALSTACK_HOST: localhost
      # 볼륨 마운트 경로 변경
      TMPDIR: /var/lib/localstack/tmp
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init:/etc/localstack/init/ready.d/
    networks:
      - currency-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      timeout: 30s
      retries: 3
      interval: 10s
      start_period: 60s

  mysql:
    image: mysql:8.4.5
    container_name: currency-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: currency_db
      MYSQL_USER: currency_user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./mysql-config/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - currency-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      timeout: 20s
      retries: 5
      interval: 10s
      start_period: 150s

  redis:
    image: redis:7-alpine
    container_name: currency-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - currency-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5
      interval: 10s
      start_period: 20s

  zookeeper:
    image: bitnami/zookeeper:3.8
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - currency-network

  kafka:
    image: bitnami/kafka:3.4
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    environment:
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_LISTENERS=INTERNAL://:9093,EXTERNAL://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper
    networks:
      - currency-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: currency-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - currency-network

  currency-service:
    build:
      context: .
      dockerfile: ./services/currency-service/Dockerfile
    container_name: currency-service
    command: sh -c "echo 'Data Ingestor is waiting for 30 seconds before starting...' && sleep 30 && python main.py"
    ports:
      - "8001:8000"
    environment:
      <<: *common-env
      SERVICE_NAME: currency-service
      PORT: "8000"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }
      localstack: { condition: service_healthy }
    networks:
      - currency-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 160s

  # Ranking Service
  ranking-service:
    build:
      context: .
      dockerfile: ./services/ranking-service/Dockerfile
    container_name: ranking-service
    command: sh -c "echo 'Data Ingestor is waiting for 30 seconds before starting...' && sleep 30 && python main.py"
    ports:
      - "8002:8000"
    environment:
      <<: *common-env
      SERVICE_NAME: ranking-service
      PORT: "8000"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }
      localstack: { condition: service_healthy }
    networks:
      - currency-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 160s

  # History Service
  history-service:
    build:
      context: .
      dockerfile: ./services/history-service/Dockerfile
    container_name: history-service
    command: sh -c "echo 'Data Ingestor is waiting for 30 seconds before starting...' && sleep 30 && python main.py"
    ports:
      - "8003:8000"
    environment:
      <<: *common-env
      SERVICE_NAME: history-service
      PORT: "8000"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }
      localstack: { condition: service_healthy }
    networks:
      - currency-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 160s

  # Data Ingestor Service
  data-ingestor:
    build:
      context: .
      dockerfile: ./services/data-ingestor/Dockerfile
    container_name: data-ingestor
    command: sh -c "echo 'Data Ingestor is waiting for 30 seconds before starting...' && sleep 30 && python main.py"
    environment:
      <<: *common-env
      SERVICE_NAME: data-ingestor
      EXECUTION_MODE: scheduler
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_started }
      localstack: { condition: service_healthy }
    networks:
      - currency-network
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*main.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 160s

volumes:
  mysql_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  localstack_data:

networks:
  currency-network:
    driver: bridge