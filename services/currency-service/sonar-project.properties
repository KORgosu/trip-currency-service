# SonarQube 프로젝트 설정
# Jenkins-SonarQube 통합을 위한 설정 파일

# 프로젝트 기본 정보
sonar.projectKey=currency-service
sonar.projectName=Currency Service
sonar.projectVersion=1.0.0

# 소스 코드 경로
sonar.sources=.
sonar.tests=.

# 테스트 커버리지 설정
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# 제외할 파일/폴더
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/env/**,**/.pytest_cache/**

# Python 특화 설정
sonar.python.version=3.8,3.9,3.10,3.11

# 코드 품질 임계값
sonar.qualitygate.wait=true

# 추가 메타데이터
sonar.organization=your-organization
sonar.host.url=http://localhost:9000
